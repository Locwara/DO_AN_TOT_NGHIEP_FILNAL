{% extends 'base.html' %}
{% block title %}Quên mật khẩu - DevLearn{% endblock %}

{% block content %}
<div class="flex min-h-[calc(100vh-200px)] items-center justify-center px-4 py-12">
    <div class="w-full max-w-md bg-white p-8 rounded-xl border border-primary-200 shadow-sm">
        <div class="flex items-center justify-center mb-6">
            <div class="flex items-center justify-center size-12 rounded-lg bg-amber-500/10 text-amber-500">
                <span class="material-symbols-outlined text-3xl">lock_reset</span>
            </div>
        </div>
        <h3 class="text-2xl font-bold mb-2 text-center">Quên mật khẩu?</h3>
        <p class="text-slate-600 text-sm text-center mb-6">Nhập email đăng ký, chúng tôi sẽ gửi link đặt lại mật khẩu</p>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium mb-1">Email</label>
                <input type="email" name="email"
                    class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary outline-none text-sm"
                    placeholder="email@example.com" required autofocus/>
            </div>
            <button type="submit" class="w-full bg-primary text-white font-bold py-3 rounded-lg shadow-lg shadow-primary/20 hover:bg-primary/90 transition-colors">
                Gửi link đặt lại
            </button>
            <p class="text-center text-sm text-slate-600 mt-4">
                <a href="{% url 'accounts:login' %}" class="text-primary font-bold hover:underline">← Quay lại đăng nhập</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
