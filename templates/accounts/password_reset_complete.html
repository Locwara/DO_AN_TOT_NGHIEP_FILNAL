{% extends 'base.html' %}
{% block title %}Đổi mật khẩu thành công - DevLearn{% endblock %}

{% block content %}
<div class="flex min-h-[calc(100vh-200px)] items-center justify-center px-4 py-12">
    <div class="w-full max-w-md bg-white p-8 rounded-xl border border-primary-200 shadow-sm text-center">
        <div class="flex items-center justify-center mb-6">
            <div class="flex items-center justify-center size-12 rounded-lg bg-emerald-500/10 text-emerald-500">
                <span class="material-symbols-outlined text-3xl">check_circle</span>
            </div>
        </div>
        <h3 class="text-2xl font-bold mb-2">Đổi mật khẩu thành công!</h3>
        <p class="text-slate-600 text-sm mb-6">
            Mật khẩu của bạn đã được cập nhật. Bạn có thể đăng nhập bằng mật khẩu mới.
        </p>
        <a href="{% url 'accounts:login' %}" class="inline-flex items-center justify-center rounded-lg h-11 px-6 bg-primary text-white text-sm font-bold hover:bg-primary/90 transition-colors shadow-lg shadow-primary/20">
            Đăng nhập ngay
        </a>
    </div>
</div>
{% endblock %}
