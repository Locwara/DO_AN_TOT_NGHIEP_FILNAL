{% extends 'base.html' %}
{% block title %}Tham gia lớp học - DevLearn{% endblock %}

{% block content %}
<div class="flex min-h-[calc(100vh-200px)] items-center justify-center px-4 py-12">
    <div class="w-full max-w-md bg-white p-8 rounded-xl border border-primary-200 shadow-sm">
        <div class="flex items-center justify-center mb-6">
            <div class="flex items-center justify-center size-12 rounded-lg bg-primary/10 text-primary">
                <span class="material-symbols-outlined text-3xl">group_add</span>
            </div>
        </div>
        <h3 class="text-2xl font-bold mb-2 text-center">Tham gia lớp học</h3>
        <p class="text-slate-600 text-sm text-center mb-6">Nhập mã mời từ giáo viên để tham gia lớp học</p>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium mb-1">Mã mời lớp học</label>
                <input type="text" name="invite_code" value="{{ form.invite_code.value|default:'' }}"
                    class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary outline-none text-lg font-bold text-center tracking-widest uppercase"
                    placeholder="ABCD1234" maxlength="10" required autofocus/>
            </div>
            <button type="submit" class="w-full bg-primary text-white font-bold py-3 rounded-lg shadow-lg shadow-primary/20 hover:bg-primary/90 transition-colors">
                Tham gia
            </button>
            <p class="text-center text-sm text-slate-600 mt-4">
                <a href="{% url 'classrooms:classroom_list' %}" class="text-primary font-bold hover:underline">← Quay lại danh sách</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
